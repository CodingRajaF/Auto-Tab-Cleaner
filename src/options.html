<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Auto Tab Cleaner 設定</title>
    <style>
        :root {
            --gap: 8px;
            --fg: #222;
            --muted: #666;
            --border: #ddd;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            font-family: system-ui, sans-serif;
            color: var(--fg);
        }

        .wrap {
            box-sizing: border-box;
            padding: 12px;
            min-width: 260px;
            max-width: 420px;
        }

        h1 {
            font-size: 16px;
            margin: 0 0 12px;
        }

        h2 {
            font-size: 14px;
            margin: 16px 0 8px;
            color: var(--muted);
        }

        label {
            display: flex;
            align-items: center;
            gap: var(--gap);
            margin-bottom: var(--gap);
        }

        input[type="number"] {
            width: 72px;
            padding: 4px 6px;
        }

        input[type="text"] {
            width: 100%;
            box-sizing: border-box;
            padding: 6px 8px;
        }

        button {
            padding: 6px 10px;
        }

        ul {
            padding-left: 16px;
            margin: 8px 0 0;
            max-height: 140px;
            overflow: auto;
            border: 1px solid var(--border);
            border-radius: 6px;
        }

        li {
            padding: 6px 8px;
        }
    </style>
</head>

<body>
    <div class="wrap">
        <h1>設定</h1>
        <label>
            削除までの放置時間（分）
            <input type="number" id="timeout" min="1" value="30" />
            <button id="save">保存</button>
        </label>
        <h2>ホワイトリスト</h2>
        <div style="display:flex; gap: var(--gap);">
            <input type="text" id="whitelistInput" placeholder="例: https://example.com" />
            <button id="addWhitelist">追加</button>
        </div>
        <ul id="whitelist"></ul>
    </div>
    <script src="options.js"></script>
</body>

</html>
